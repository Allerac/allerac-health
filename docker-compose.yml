services:
  # PostgreSQL - Dados de usuarios e configuracoes
  postgres:
    image: postgres:16-alpine
    container_name: allerac-health-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-allerac_health}
      POSTGRES_USER: ${POSTGRES_USER:-allerac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-allerac_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - allerac-health
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-allerac} -d ${POSTGRES_DB:-allerac_health}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Cache e fila de jobs (internal only)
  redis:
    image: redis:7-alpine
    container_name: allerac-health-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - allerac-health
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # InfluxDB - Dados de saude/metricas
  influxdb:
    image: influxdb:1.11
    container_name: allerac-health-influxdb
    restart: unless-stopped
    environment:
      INFLUXDB_DB: ${INFLUXDB_DB:-health_metrics}
      INFLUXDB_USER: ${INFLUXDB_USER:-allerac}
      INFLUXDB_USER_PASSWORD: ${INFLUXDB_PASSWORD:-allerac_secret}
      INFLUXDB_DATA_INDEX_VERSION: tsi1
    volumes:
      - influxdb_data:/var/lib/influxdb
    networks:
      - allerac-health
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: allerac-health-backend
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-allerac_health}
      - POSTGRES_USER=${POSTGRES_USER:-allerac}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-allerac_secret}
      - REDIS_URL=redis://redis:6379/0
      - INFLUXDB_HOST=influxdb
      - INFLUXDB_PORT=8086
      - INFLUXDB_DB=${INFLUXDB_DB:-health_metrics}
      - INFLUXDB_USER=${INFLUXDB_USER:-allerac}
      - INFLUXDB_PASSWORD=${INFLUXDB_PASSWORD:-allerac_secret}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32-byte-key-for-encryption-here}
      - ALLERAC_ONE_SECRET_KEY=${ALLERAC_ONE_SECRET_KEY:-}
      # allerac-one OIDC: id_token validation via JWKS (RS256)
      - ALLERAC_ONE_ISSUER=${ALLERAC_ONE_ISSUER:-https://chat.allerac.ai/api/oidc}
      - ALLERAC_ONE_JWKS_URI=${ALLERAC_ONE_JWKS_URI:-https://chat.allerac.ai/api/oidc/jwks}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - allerac-health
      - allerac
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  # Worker - Celery para jobs em background
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: allerac-health-worker
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-allerac_health}
      - POSTGRES_USER=${POSTGRES_USER:-allerac}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-allerac_secret}
      - REDIS_URL=redis://redis:6379/0
      - INFLUXDB_HOST=influxdb
      - INFLUXDB_PORT=8086
      - INFLUXDB_DB=${INFLUXDB_DB:-health_metrics}
      - INFLUXDB_USER=${INFLUXDB_USER:-allerac}
      - INFLUXDB_PASSWORD=${INFLUXDB_PASSWORD:-allerac_secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-32-byte-key-for-encryption-here}
    volumes:
      - ./worker:/app
    networks:
      - allerac-health
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  # Frontend - Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: allerac-health-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3002}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      # allerac-one OIDC SSO (authorization_code flow)
      - ALLERAC_ONE_ISSUER=${ALLERAC_ONE_ISSUER:-https://chat.allerac.ai/api/oidc}
      - ALLERAC_ONE_CLIENT_ID=${ALLERAC_ONE_CLIENT_ID:-allerac-health}
      - ALLERAC_ONE_CLIENT_SECRET=${ALLERAC_ONE_CLIENT_SECRET:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3002:3000"
    networks:
      - allerac-health
    depends_on:
      - backend

  # Cloudflare Tunnel — exposes health.allerac.ai and API publicly
  # Configure public hostnames in Cloudflare Zero Trust dashboard:
  #   health.allerac.ai     → http://localhost:3002  (frontend)
  #   health-api.allerac.ai → http://localhost:8000  (backend, optional)
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: allerac-health-tunnel
    restart: unless-stopped
    command: tunnel run
    network_mode: host
    environment:
      - TUNNEL_TOKEN=${HEALTH_TUNNEL_TOKEN:-}
    depends_on:
      - frontend
      - backend
    profiles:
      - tunnel

networks:
  # Internal network for allerac-health services
  allerac-health:
    name: allerac-health
  # Shared network with allerac-one (optional — enables direct container communication)
  # The install.sh script creates this network automatically.
  allerac:
    name: allerac
    external: true

volumes:
  postgres_data:
  redis_data:
  influxdb_data:
